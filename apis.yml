aid: udacity
name: Udacity
description: >-
  Udacity is an online tech-upskilling platform offering project-based
  Nanodegree programs, individual courses, and enterprise workforce
  development across Artificial Intelligence, Generative AI, Agentic AI,
  Data Science, Cloud Computing, Cybersecurity, Programming, Autonomous
  Systems, Product Management, and DevOps. Founded by Sebastian Thrun
  out of the Stanford CS221 free online AI course in 2011, Udacity
  pioneered the Nanodegree credential and partnered with industry
  leaders (AWS, Google, Meta, Microsoft, NVIDIA, Mercedes-Benz) to
  co-develop curriculum. In 2024 Accenture acquired Udacity for
  approximately $1B and folded the platform into LearnVantage,
  Accenture's enterprise learning and skilling business. Udacity
  reports 25M+ learners globally and remains best known for its
  Self-Driving Car, Deep Learning, and Generative AI Nanodegrees, with
  hands-on projects reviewed by human mentors and career services.
  Udacity does not publish a public developer API, SDK, or developer
  portal — enterprise customers integrate via Accenture LearnVantage
  sales channels rather than self-service APIs. Its public GitHub
  organization (github.com/udacity) hosts 1,100+ open-source classroom
  and course-content repositories (e.g. deep-learning-v2-pytorch,
  self-driving-car, cd13303-genai-c1-classroom) used as Nanodegree
  exercises, not as official platform APIs.
